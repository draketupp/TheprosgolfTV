<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>
<body>
  <!-- Banner, Channel Info, Tabs, Main sections – unchanged except for dynamic video count -->
  <div class="bg-white border-b shadow-sm sticky top-0 z-10">
    <!-- ... existing content ... -->
    <div class="text-sm sm:text-base text-gray-600 mt-1">@DTprogolf • 21 subscribers • <span id="videoCount">...</span> videos</div>
    <!-- ... rest unchanged ... -->

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <!-- Latest Upload -->
    <div id="latestSection" class="mb-12">
      <h2 class="text-3xl sm:text-4xl font-bold mb-6 text-center">Latest Upload 🔥</h2>
      <div id="latestVideoContainer" class="relative">
        <div id="latestLoading" class="absolute inset-0 flex items-center justify-center bg-black text-white text-lg sm:text-xl font-medium">
          Loading your newest video...
        </div>
        <iframe id="latestIframe" frameborder="0" allowfullscreen allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div>
      <h3 id="latestTitle" class="text-xl sm:text-2xl font-bold mt-4 text-center"></h3>
      <p id="latestMeta" class="text-center text-gray-600 mt-2 text-sm"></p>
    </div>

    <div id="videosSection">
      <h2 class="text-2xl sm:text-3xl font-bold mb-6">My Videos</h2>
      <div id="videoGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6"></div>
    </div>

    <!-- Shorts, Collabs, Community sections unchanged -->
  </main>

  <!-- Modal unchanged -->

  <script>
    const API_KEY = 'AIzaSyCiGyW1HmtYSaLZv-PCA05hwRS0ZIR4P2Y';
    const CHANNEL_ID = 'UCJjRscH3l030SOmy2tWxcoA';

    // Hardcoded shorts (unchanged)
    const shorts = [
      // ... your existing shorts array ...
    ];

    async function fetchYT(endpoint, params = {}) {
      const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
      url.search = new URLSearchParams({ ...params, key: API_KEY }).toString();
      const res = await fetch(url);
      if (!res.ok) throw new Error(`YouTube API error: ${res.status} ${await res.text()}`);
      return res.json();
    }

    // Parse ISO 8601 duration to MM:SS or H:MM:SS
    function formatDuration(iso) {
      if (!iso) return '?';
      const match = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
      if (!match) return '?';
      const h = parseInt(match[1] || 0);
      const m = parseInt(match[2] || 0);
      const s = parseInt(match[3] || 0);
      if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      return `${m}:${s.toString().padStart(2,'0')}`;
    }

    // Format numbers: 1234 → 1.2K, etc.
    function formatNumber(num) {
      if (!num) return '?';
      num = parseInt(num, 10);
      if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
      if (num >= 1_000) return (num / 1_000).toFixed(1) + 'K';
      return num.toString();
    }

    async function getVideoExtraData(videoIds) {
      if (!videoIds.length) return {};
      const data = await fetchYT('videos', {
        part: 'contentDetails,statistics',
        id: videoIds.join(',')
      });
      const result = {};
      data.items?.forEach(item => {
        result[item.id] = {
          duration: formatDuration(item.contentDetails?.duration),
          views: formatNumber(item.statistics?.viewCount),
          likes: formatNumber(item.statistics?.likeCount)
        };
      });
      return result;
    }

    function renderGrid(gridId, items, isShort = false) {
      const grid = document.getElementById(gridId);
      if (!grid) return;
      grid.innerHTML = '';
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="relative">
            <img src="${item.thumbnail}" alt="${item.title}" class="w-full aspect-video object-cover">
            <span class="duration">${item.duration || (isShort ? 'Short' : 'Video')}</span>
          </div>
          <div class="p-3 sm:p-4">
            <h3 class="font-medium text-sm sm:text-base line-clamp-2">${item.title}</h3>
            <p class="meta mt-1">${item.views} • <span class="likes">${item.likes}</span></p>
          </div>
        `;
        card.onclick = () => play(item.id, item.title);
        grid.appendChild(card);
      });
    }

    // play, closeModal, showSection functions unchanged...

    async function loadLatestVideo() {
      const loading = document.getElementById('latestLoading');
      const iframe = document.getElementById('latestIframe');
      const titleEl = document.getElementById('latestTitle');
      const metaEl = document.getElementById('latestMeta');

      loading.textContent = 'Fetching latest video...';
      iframe.src = '';

      try {
        const searchData = await fetchYT('search', {
          part: 'snippet',
          channelId: CHANNEL_ID,
          maxResults: 5,  // Grab a few in case newest is a Short
          order: 'date',
          type: 'video'
        });

        let candidates = searchData.items || [];

        for (const vid of candidates) {
          const extra = await getVideoExtraData([vid.id.videoId]);
          const info = extra[vid.id.videoId];
          if (info && info.duration !== '?' && !info.duration.startsWith('0:')) {  // Rough non-Short check
            const embedUrl = `https://www.youtube.com/embed/${vid.id.videoId}?autoplay=1&mute=1&rel=0&modestbranding=1`;
            iframe.src = embedUrl;
            titleEl.textContent = vid.snippet.title;
            metaEl.textContent = `${info.duration} • ${info.views} views • ${info.likes} likes (click to unmute)`;
            loading.style.display = 'none';
            return;
          }
        }
      } catch (err) {
        console.error('Latest fetch failed:', err);
      }

      // Fallback
      loading.textContent = 'Showing fallback (newest may be a Short)';
      iframe.src = 'https://www.youtube.com/embed/fTWL5avcsa8?autoplay=1&mute=1&rel=0&modestbranding=1';
      titleEl.textContent = 'Yogi bear golf tournament.';
      metaEl.textContent = '6:30 • ? views • ? likes';
    }

    async function loadVideosGrid() {
      const grid = document.getElementById('videoGrid');
      const countEl = document.getElementById('videoCount');
      if (!grid) return;

      grid.innerHTML = '<p class="col-span-full text-center py-8">Loading videos (excluding Shorts)...</p>';

      try {
        let playlistId;
        try {
          const channelData = await fetchYT('channels', { part: 'contentDetails', id: CHANNEL_ID });
          playlistId = channelData?.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;
        } catch (e) {}

        const videos = [];
        let nextPage = '';

        if (playlistId) {
          do {
            const data = await fetchYT('playlistItems', {
              part: 'snippet',
              maxResults: 50,
              playlistId,
              pageToken: nextPage
            });
            data.items.forEach(item => {
              if (item.snippet.resourceId.kind === 'youtube#video') {
                videos.push({
                  id: item.snippet.resourceId.videoId,
                  title: item.snippet.title,
                  thumbnail: item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url
                });
              }
            });
            nextPage = data.nextPageToken;
          } while (nextPage);
        } else {
          // Search fallback
          const data = await fetchYT('search', {
            part: 'snippet',
            channelId: CHANNEL_ID,
            maxResults: 50,
            order: 'date',
            type: 'video'
          });
          data.items?.forEach(vid => {
            videos.push({
              id: vid.id.videoId,
              title: vid.snippet.title,
              thumbnail: vid.snippet.thumbnails?.high?.url || vid.snippet.thumbnails?.medium?.url || vid.snippet.thumbnails?.default?.url
            });
          });
        }

        if (!videos.length) throw new Error('No videos');

        // Batch fetch extra data (duration, views, likes)
        const extraData = await getVideoExtraData(videos.map(v => v.id));

        // Filter out Shorts (≤ 60s)
        const nonShorts = videos.filter(v => {
          const dur = extraData[v.id]?.duration;
          return dur && dur !== '?' && !dur.startsWith('0:');  // Exclude 0:xx or under ~60s
        }).map(v => ({
          ...v,
          ...extraData[v.id] || { duration: '?', views: '?', likes: '?' }
        }));

        countEl.textContent = nonShorts.length;
        if (nonShorts.length > 0) {
          renderGrid('videoGrid', nonShorts);
        } else {
          grid.innerHTML = '<p class="col-span-full text-center py-8 text-yellow-600">No regular videos found (all recent are Shorts?)</p>';
        }

      } catch (err) {
        console.error(err);
        grid.innerHTML = '<p class="col-span-full text-center py-8 text-red-600">Error loading videos. Try refreshing.</p>';
        countEl.textContent = '?';
      }
    }

    // Community functions unchanged...

    window.onload = () => {
      renderGrid('shortsGrid', shorts, true);
      showSection('videos');
      loadLatestVideo();
      loadVideosGrid();
      loadComments();
    };
  </script>
</body>
